version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: wdi_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-wdi_project}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: wdi_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./Data:/app/Data:ro
      - ./SQL:/app/SQL:ro

volumes:
  mysql_data:
